<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryVault React</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/config.public.js"></script>
    <!-- ml5.js library for client-side face detection -->
    <script>
      window.__loadMl5Script = function (url) {
        return new Promise(function (resolve, reject) {
          const script = document.createElement("script");
          script.src = url;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      };

      window.__loadMl5Script("https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js")
        .catch(function () {
          return window.__loadMl5Script("https://unpkg.com/ml5@0.12.2/dist/ml5.min.js");
        })
        .catch(function () {
          console.error("Failed to load ml5 from both CDNs.");
        });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
